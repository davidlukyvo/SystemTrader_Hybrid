# Sample nginx site for SystemTrader Hybrid on Ubuntu 24.04.
# Install target suggestion:
#   sudo cp ops/nginx/systemtrader.conf /etc/nginx/sites-available/systemtrader
#   sudo ln -s /etc/nginx/sites-available/systemtrader /etc/nginx/sites-enabled/systemtrader

server {
    listen 80;
    server_name _;

    root /opt/systemtrader;
    index index.html;

    access_log /var/log/nginx/systemtrader.access.log;
    error_log /var/log/nginx/systemtrader.error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Local-only Telegram relay. The browser never receives TELEGRAM_BOT_TOKEN.
    location /api/telegram/send {
        proxy_pass http://127.0.0.1:8787/telegram/send;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
