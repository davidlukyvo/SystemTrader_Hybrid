<!DOCTYPE html>
<html lang="vi">
<head>

      </a>
      <a class="nav-item" data-page="plan" href="#plan">
        <span class="nav-icon">📋</span><span>Trade Plan</span>
      </a>

      </a>
      <a class="nav-item" data-page="analytics" href="#analytics">

      <a class="nav-item" data-page="scan-history" href="#scan-history">

    <div id="page-scanner" class="page"></div>
